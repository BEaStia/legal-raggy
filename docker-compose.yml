services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDING_PROVIDER=e5
    volumes:
      - laws_data:/app/data/raw/laws
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6333/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  laws-updater:
    build: .
    command: python scripts/update_laws_cron.py
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - laws_data:/app/data/raw/laws
      - ./data/logs:/app/data/logs
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"
    profiles:
      - cron

volumes:
  qdrant_data:
  laws_data:
