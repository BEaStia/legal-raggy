{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div>
            <h2 class="card-title" style="margin-bottom: 0.5rem;">{{ title }}</h2>
            <span class="badge badge-ok">Версия: {{ version }}</span>
        </div>
        <a href="/admin" class="btn btn-secondary">← Назад к списку</a>
    </div>
    <div class="report">
        {{ html_content|safe }}
    </div>
</div>
{% endblock %}
